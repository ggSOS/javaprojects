spring.application.name=AutoEscola3ESPB

# Configurar porta
server.port=8080

## Configuracoes do banco de dados
# URL
spring.datasource.url=jdbc:mysql://localhost/auto_escola_3espb
# URL para versoes mais antigas de Spring
#spring.datasource.url=jdbc:mysql://localhost:3306/auto_escola_3espb
# Usuario
spring.datasource.username=root
# Senha
spring.datasource.password=fiap
# Driver necessario para versoes mais antigas de Spring
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


## Configurar resposta no console
# printar operacao SQL
spring.jpa.show-sql=true
# organizar operacao SQL
spring.jpa.properties.hibernate.format_sql=true

# retirar informacoes sensiveis de um retorno tipo 500
server.error.include-stacktrace = never

#esconder chave do token
api.security.token.secret=${JWT_TOKEN:12345678}